<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo app</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <h1>TO do app</h1>
    <div class="wrapper">
    <form>
<input id="todo-input"   type="text" placeholder="write anything and hit enter to add" autocomplete="off">

 <button id="add-button">add</button>
    </form>
    <ul id="todo-list">
    <li class="todo">
<input type="checkbox" id="todo-1">
<label  class="custom-checkbox" for="todo-1">
<svg fill="transparent"      xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
</svg>

    
</label>
<label for="todo-1" class="todo-text">
   workout
</label>
<button class="delete-button">
   
        <svg fill="var(--secondary-color)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-9l-1 1H5v2h14V4z"/>
        </svg>
 

</button>
    </li>
    <li class="todo">
<input type="checkbox" id="todo-2">
<label  class="custom-checkbox" for="todo-2">
<svg fill="transparent"     xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
</svg>

    
</label>
<label for="todo-2" class="todo-text">
    homework

</label>
<button class="delete-button">
    <svg fill="var(--secondary-color)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-9l-1 1H5v2h14V4z"/>
    </svg>

</button>
    </li>
    </ul>

    </div>
</body>
</html>
